<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Classes e Ids</title>
	<style type="text/css">
		p{
			color: red;
		}
		h1{
			color: green;
		}
		.azul {
			color: blue;
		}
		#cabecalho {
			background: green;
		}
		#topo {
			background: yellow;
		}
		#conteudo {
			background: red;
		}
		#rodape {
			background: green;			
		}
		#assinatura {
			background: pink;
		}
		#azul{
			background: blue;
		}
		.produto {
			background: gray;
			margin: 10px;
		}


	</style>
</head>
<body>

	<div id="topo">
		<img src="imagens/logo.png" width="200">
		<ul>
			<li>Home</li>
			<li>Quem somos</li>
			<li>Contato</li>
		</ul>
	</div>

	<div id="conteudo">
		<div class="produto">
			Produto 1
		</div>
		<div class="produto">
			Produto 2
		</div>
		<div class="produto">
			Produto 3
		</div>
	</div>
	<div id="rodape">Todos os <span id="azul">direitos</span>  reservados</div>

	<span id="assinatura">Ruan</span>

</body>
</html>
